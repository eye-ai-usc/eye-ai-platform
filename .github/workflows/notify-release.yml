name: Notify on Stack Release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Post to Slack
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"New EyeAI stack release: ${{ github.event.release.tag_name }}. Changelog: ${{ github.event.release.html_url }}. To update: uv sync --frozen\"}"
