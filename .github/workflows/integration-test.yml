name: Integration Test - Latest Stack

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  test-latest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install with latest upstream
        working-directory: lockfiles/stable
        run: uv sync --upgrade-package eye-ai

      - name: Run smoke tests
        working-directory: lockfiles/stable
        run: uv run pytest ../../tests/integration/ -v

      - name: Open PR with updated testing lockfile on success
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          title: "chore: update testing lockfile"
          branch: "lockfile/testing"
          commit-message: "Update testing/uv.lock with latest upstream"
          add-paths: lockfiles/testing/uv.lock
