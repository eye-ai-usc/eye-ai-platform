name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install MkDocs Material
        run: uv tool install mkdocs-material

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
