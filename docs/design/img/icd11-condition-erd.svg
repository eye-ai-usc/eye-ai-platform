<svg viewBox="0 0 900 640" width="900" height="640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="640" fill="#ffffff"/>
  <style>
    .nm  { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 9.5px; font-style: italic; fill: #6b6b6b; }
    .col { font-size: 11px; fill: #333333; }
    .pk  { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
    .fk  { font-size: 11px; fill: #1f6feb; }
    .note{ font-size: 10.5px; fill: #6b6b6b; }
    .box { fill: #ffffff; stroke: #cfcfcf; stroke-width: 1.5; }
    .hdr { fill: #f1f1f1; }
    .div { stroke: #e2e2e2; stroke-width: 1; }
    .rel { stroke: #8a8a8a; stroke-width: 1.6; fill: none; }
    .lbl { font-size: 10px; font-weight: 600; fill: #555555; }
  </style>

  <text x="20" y="34" font-size="19" font-weight="700" fill="#1a1a1a">Condition_Label IS the ICD-11 concept — one vocabulary, reached two ways</text>
  <text x="20" y="56" class="note" font-size="11.5">Chart review picks the ICD-11 term directly (ICD-11-native). Legacy ICD-10 records cross-walk UP to the same term.</text>

  <!-- LEGACY ICD-10 PATH label -->
  <text x="20" y="92" class="lbl" fill="#444444">LEGACY ICD-10 PATH — ICD-10 code cross-walks UP to its ICD-11 concept</text>

  <!-- ICD10_Eye -->
  <rect class="box" x="20" y="104" width="170" height="118" rx="8"/>
  <path class="hdr" d="M20 112 a8 8 0 0 1 8 -8 h154 a8 8 0 0 1 8 8 v20 h-170 z"/>
  <text class="nm" x="32" y="126">ICD10_Eye</text>
  <text class="sub" x="32" y="142">vocab · one term per legacy ICD-10 code</text>
  <line class="div" x1="20" y1="149" x2="190" y2="149"/>
  <text class="pk" x="32" y="168">Name (PK) — H40.02</text>
  <text class="col" x="32" y="186">Description</text>
  <text class="fk" x="32" y="204">ID / URI — ICD10:H40.02</text>

  <!-- Map -->
  <rect class="box" x="270" y="96" width="220" height="134" rx="8"/>
  <path class="hdr" d="M270 104 a8 8 0 0 1 8 -8 h204 a8 8 0 0 1 8 8 v20 h-220 z"/>
  <text class="nm" x="282" y="118">ICD10_Condition_Map</text>
  <text class="sub" x="282" y="134">association · ICD-10 → ICD-11 cross-walk</text>
  <line class="div" x1="270" y1="141" x2="490" y2="141"/>
  <text class="pk" x="282" y="160">RID (PK)</text>
  <text class="fk" x="282" y="178">ICD10_Eye (FK)</text>
  <text class="fk" x="282" y="196">Condition_Label (FK)</text>
  <line class="div" x1="270" y1="208" x2="490" y2="208"/>
  <text class="note" x="282" y="224">exact codes, many → one</text>

  <!-- ICD10_Eye -> map -->
  <path class="rel" d="M190 163 H270"/>
  <text class="lbl" x="205" y="157">N</text><text class="lbl" x="255" y="157">1</text>

  <!-- Condition_Label (center-right, the hub) -->
  <rect class="box" x="570" y="96" width="270" height="176" rx="8"/>
  <path class="hdr" d="M570 104 a8 8 0 0 1 8 -8 h254 a8 8 0 0 1 8 8 v20 h-270 z"/>
  <text class="nm" x="582" y="118">Condition_Label  =  ICD-11 concept</text>
  <text class="sub" x="582" y="134">vocab · ICD-11 terms; short name = display</text>
  <line class="div" x1="570" y1="141" x2="840" y2="141"/>
  <text class="pk" x="582" y="160">Name (PK) — GS  (display for 9C60)</text>
  <text class="col" x="582" y="178">Description</text>
  <text class="fk" x="582" y="196" font-weight="700">ID / URI — ICD11:9C60</text>
  <text class="note" x="592" y="212">↑ the identity · semantic lookup BY CODE</text>
  <text class="col" x="582" y="232">Synonyms — WHO index terms</text>
  <text class="note" x="592" y="248">(human names · semantic lookup BY NAME)</text>
  <line class="div" x1="570" y1="256" x2="840" y2="256"/>
  <text class="note" x="582" y="268">the term IS the ICD-11 concept</text>

  <!-- map -> Condition_Label -->
  <path class="rel" d="M490 163 H570"/>
  <text class="lbl" x="505" y="157">N</text><text class="lbl" x="555" y="157">1</text>

  <!-- ICD-11 source note box -->
  <rect class="box" x="570" y="318" width="270" height="86" rx="8" stroke-dasharray="5 4"/>
  <path class="hdr" d="M570 326 a8 8 0 0 1 8 -8 h254 a8 8 0 0 1 8 8 v20 h-270 z"/>
  <text class="nm" x="582" y="340">ICD-11 MMS (WHO · canonical)</text>
  <text class="sub" x="582" y="356">the categorization the vocab follows</text>
  <line class="div" x1="570" y1="363" x2="840" y2="363"/>
  <text class="col" x="582" y="382">9C60 = Glaucoma suspect (sibling of 9C61)</text>
  <text class="note" x="582" y="398">9C61.0 POAG · 9C61.1 PACG · 9C61.Z unspec.</text>

  <!-- ICD-11 -> Condition_Label.ID -->
  <path class="rel" d="M705 318 V272" stroke-dasharray="5 4"/>
  <text class="lbl" x="712" y="298">defines</text>

  <!-- Chart-review path -->
  <text x="20" y="318" class="lbl" fill="#444444">CHART-REVIEW PATH — reviewer picks the ICD-11 term directly (ICD-11-native; no cross-walk)</text>

  <rect class="box" x="20" y="330" width="170" height="80" rx="8"/>
  <path class="hdr" d="M20 338 a8 8 0 0 1 8 -8 h154 a8 8 0 0 1 8 8 v20 h-170 z"/>
  <text class="nm" x="32" y="352">Subject</text>
  <text class="sub" x="32" y="368">via Chart_Label feature</text>
  <line class="div" x1="20" y1="375" x2="190" y2="375"/>
  <text class="fk" x="32" y="394">Condition_Label (FK) — ICD-11 term</text>

  <!-- Subject -> Condition_Label -->
  <path class="rel" d="M190 370 C380 370 400 184 570 184"/>
  <text class="lbl" x="320" y="364">N</text><text class="lbl" x="555" y="200">1</text>

  <!-- Legend -->
  <rect x="20" y="436" width="820" height="186" rx="8" fill="#f7f7f7" stroke="#e2e2e2" stroke-width="1"/>
  <text x="36" y="460" font-size="13" font-weight="700" fill="#1a1a1a">The model in four lines</text>

  <circle cx="44" cy="484" r="4" fill="#1f6feb"/>
  <text x="58" y="488" class="col"><tspan font-weight="600">Condition_Label IS the ICD-11 concept</tspan>  → ICD-11 code is the term's identity (ID/URI); GS = display name for 9C60.</text>

  <circle cx="44" cy="510" r="4" fill="#1f6feb"/>
  <text x="58" y="514" class="col"><tspan font-weight="600">Lookup by code → ID</tspan> · <tspan font-weight="600">lookup by name → Synonyms</tspan> (WHO index terms). The code is NOT duplicated into Synonyms.</text>

  <circle cx="44" cy="536" r="4" fill="#1f6feb"/>
  <text x="58" y="540" class="col"><tspan font-weight="600">Two ways to reach one term</tspan>  → chart review picks the ICD-11 term directly; legacy ICD-10 cross-walks up to it.</text>

  <circle cx="44" cy="562" r="4" fill="#1f6feb"/>
  <text x="58" y="566" class="col"><tspan font-weight="600">The cross-walk (ICD10_Condition_Map)</tspan>  is upstream of Condition_Label, not a hop off Subject; replaces hard-coded compute_condition_label().</text>

  <text x="36" y="592" class="note">ICD-11 codes verified 2026-06-30 vs WHO ICD-11 MMS (suspect 9C60 is a sibling of the 9C61 Glaucoma block, not a child).</text>
  <text x="36" y="610" class="note">Provisional design — member-set reconciliation to ICD-11 (e.g. 9C61.2/.3/.4) pending Dr. Bolo / Dr. Xu.</text>
</svg>
