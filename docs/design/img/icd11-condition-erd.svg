<svg viewBox="0 0 940 720" width="940" height="720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="720" fill="#ffffff"/>
  <style>
    .nm  { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 9.5px; font-style: italic; fill: #6b6b6b; }
    .col { font-size: 11px; fill: #333333; }
    .pk  { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
    .fk  { font-size: 11px; fill: #1f6feb; }
    .note{ font-size: 10.5px; fill: #6b6b6b; }
    .box { fill: #ffffff; stroke: #cfcfcf; stroke-width: 1.5; }
    .hdr { fill: #f1f1f1; }
    .div { stroke: #e2e2e2; stroke-width: 1; }
    .rel { stroke: #8a8a8a; stroke-width: 1.6; fill: none; }
    .lbl { font-size: 10px; font-weight: 600; fill: #555555; }
    .cond{ stroke: #c98a1b; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
  </style>

  <text x="20" y="34" font-size="19" font-weight="700" fill="#1a1a1a">Chart_Label model — Condition and Severity are two axes on one row</text>
  <text x="20" y="56" class="note" font-size="11.5">Condition_Label IS the ICD-11 concept (chart review direct, or ICD-10 cross-walked up). Severity is a separate axis, valid only when the condition is glaucoma.</text>

  <!-- ===================== TOP BAND: condition + ICD grounding ===================== -->
  <text x="20" y="90" class="lbl" fill="#444444">CONDITION AXIS — grounded in ICD-11; legacy ICD-10 cross-walks UP to the concept</text>

  <!-- ICD10_Eye -->
  <rect class="box" x="20" y="102" width="168" height="104" rx="8"/>
  <path class="hdr" d="M20 110 a8 8 0 0 1 8 -8 h152 a8 8 0 0 1 8 8 v20 h-168 z"/>
  <text class="nm" x="32" y="124">ICD10_Eye</text>
  <text class="sub" x="32" y="140">vocab · one term per ICD-10 code</text>
  <line class="div" x1="20" y1="147" x2="188" y2="147"/>
  <text class="pk" x="32" y="166">Name (PK) — H40.02</text>
  <text class="fk" x="32" y="185">ID / URI — ICD10:H40.02</text>

  <!-- Map -->
  <rect class="box" x="258" y="94" width="208" height="120" rx="8"/>
  <path class="hdr" d="M258 102 a8 8 0 0 1 8 -8 h192 a8 8 0 0 1 8 8 v20 h-208 z"/>
  <text class="nm" x="270" y="116">ICD10_Condition_Map</text>
  <text class="sub" x="270" y="132">association · ICD-10 → ICD-11</text>
  <line class="div" x1="258" y1="139" x2="466" y2="139"/>
  <text class="pk" x="270" y="158">RID (PK)</text>
  <text class="fk" x="270" y="176">ICD10_Eye (FK)</text>
  <text class="fk" x="270" y="194">Condition_Label (FK)</text>

  <!-- ICD10_Eye -> map -->
  <path class="rel" d="M188 161 H258"/>
  <text class="lbl" x="203" y="155">N</text><text class="lbl" x="243" y="155">1</text>

  <!-- Condition_Label (hub, top-right) -->
  <rect class="box" x="596" y="94" width="264" height="150" rx="8"/>
  <path class="hdr" d="M596 102 a8 8 0 0 1 8 -8 h248 a8 8 0 0 1 8 8 v20 h-264 z"/>
  <text class="nm" x="608" y="116">Condition_Label  =  ICD-11 concept</text>
  <text class="sub" x="608" y="132">vocab · ICD-11 terms; short name = display</text>
  <line class="div" x1="596" y1="139" x2="860" y2="139"/>
  <text class="pk" x="608" y="158">Name (PK) — GS  (display for 9C60)</text>
  <text class="fk" x="608" y="176" font-weight="700">ID / URI — ICD11:9C60</text>
  <text class="note" x="618" y="191">↑ identity · lookup BY CODE</text>
  <text class="col" x="608" y="209">Synonyms — WHO index terms</text>
  <text class="note" x="618" y="224">(human names · lookup BY NAME)</text>

  <!-- map -> Condition_Label -->
  <path class="rel" d="M466 155 H596 V160"/>
  <text class="lbl" x="481" y="149">N</text><text class="lbl" x="581" y="149">1</text>

  <!-- Severity_Label (top-right, below condition) -->
  <rect class="box" x="596" y="270" width="264" height="104" rx="8"/>
  <path class="hdr" d="M596 278 a8 8 0 0 1 8 -8 h248 a8 8 0 0 1 8 8 v20 h-264 z"/>
  <text class="nm" x="608" y="292">Severity_Label</text>
  <text class="sub" x="608" y="308">vocab · stage of established glaucoma</text>
  <line class="div" x1="596" y1="315" x2="860" y2="315"/>
  <text class="pk" x="608" y="334">Name (PK) — Mild / Moderate / Severe</text>
  <text class="col" x="608" y="352">Not Staged / Indeterminate</text>
  <text class="note" x="608" y="368">(GS, Normal retired — they are conditions)</text>

  <!-- ===================== BOTTOM BAND: Chart_Label feature ===================== -->
  <text x="20" y="300" class="lbl" fill="#444444">CHART_LABEL FEATURE — carries BOTH axes on one row</text>

  <!-- Chart_Label feature (the join row) -->
  <rect class="box" x="20" y="314" width="300" height="150" rx="8"/>
  <path class="hdr" d="M20 322 a8 8 0 0 1 8 -8 h284 a8 8 0 0 1 8 8 v20 h-300 z"/>
  <text class="nm" x="32" y="336">Execution_Subject_Chart_Label</text>
  <text class="sub" x="32" y="352">Chart_Label feature on Subject (2,302 rows)</text>
  <line class="div" x1="20" y1="359" x2="320" y2="359"/>
  <text class="fk" x="32" y="378">Subject (FK)</text>
  <text class="fk" x="32" y="397" font-weight="700">Condition_Label (FK)  — which glaucoma</text>
  <text class="fk" x="32" y="416" font-weight="700">Severity_Label (FK)   — the stage</text>
  <line class="div" x1="20" y1="428" x2="320" y2="428"/>
  <text class="note" x="32" y="447">two side-by-side FK columns on the same row</text>

  <!-- Chart_Label -> Condition_Label (direct, ICD-11-native) -->
  <path class="rel" d="M320 388 C470 388 480 168 596 168"/>
  <text class="lbl" x="410" y="250">N</text><text class="lbl" x="581" y="182">1</text>
  <text class="lbl" x="392" y="266" fill="#1f6feb">chart review picks</text>
  <text class="lbl" x="392" y="279" fill="#1f6feb">the term directly</text>

  <!-- Chart_Label -> Severity_Label -->
  <path class="rel" d="M320 410 C450 410 470 322 596 322"/>
  <text class="lbl" x="440" y="430">N</text><text class="lbl" x="581" y="336">1</text>

  <!-- conditional constraint between the two FKs -->
  <path class="cond" d="M728 244 V270"/>
  <text class="lbl" x="736" y="261" fill="#c98a1b">severity valid only if</text>
  <text class="lbl" x="736" y="274" fill="#c98a1b">condition = glaucoma</text>

  <!-- ===================== Legend ===================== -->
  <rect x="20" y="486" width="900" height="212" rx="8" fill="#f7f7f7" stroke="#e2e2e2" stroke-width="1"/>
  <text x="36" y="510" font-size="13" font-weight="700" fill="#1a1a1a">The model in five lines</text>

  <circle cx="44" cy="534" r="4" fill="#1f6feb"/>
  <text x="58" y="538" class="col"><tspan font-weight="600">Two axes, one row</tspan>  → the Chart_Label feature carries Condition_Label AND Severity_Label as side-by-side FKs.</text>

  <circle cx="44" cy="560" r="4" fill="#c98a1b"/>
  <text x="58" y="564" class="col"><tspan font-weight="600">Separate but conditional</tspan>  → severity is meaningful only when the condition is glaucoma (POAG/PACG); else not-applicable.</text>

  <circle cx="44" cy="586" r="4" fill="#1f6feb"/>
  <text x="58" y="590" class="col"><tspan font-weight="600">Condition_Label IS the ICD-11 concept</tspan>  → ICD-11 code is the identity (ID/URI); GS = display name for 9C60.</text>

  <circle cx="44" cy="612" r="4" fill="#1f6feb"/>
  <text x="58" y="616" class="col"><tspan font-weight="600">Two ways to reach the condition</tspan>  → chart review picks it directly; legacy ICD-10 cross-walks up via ICD10_Condition_Map.</text>

  <circle cx="44" cy="638" r="4" fill="#1f6feb"/>
  <text x="58" y="642" class="col"><tspan font-weight="600">Lookup</tspan>  → by code via ID, by name via Synonyms (WHO index terms); codes never go in Synonyms.</text>

  <text x="36" y="668" class="note">ICD-11 codes verified 2026-06-30 vs WHO ICD-11 MMS (suspect 9C60 is a sibling of the 9C61 Glaucoma block, not a child).</text>
  <text x="36" y="686" class="note">Provisional — the conditional severity constraint and member-set reconciliation (e.g. 9C61.2/.3/.4) pending Dr. Bolo / Dr. Xu.</text>
</svg>
